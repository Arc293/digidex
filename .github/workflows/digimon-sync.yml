name: Digimon Sync

on:
  schedule:
    - cron: '0 4 * * *'   # 4 AM UTC daily
  workflow_dispatch:
    inputs:
      refresh_all:
        description: 'Re-scrape all pages (full refresh)'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: supabase_backend/sync/requirements.txt

      - name: Install dependencies
        run: pip install -r supabase_backend/sync/requirements.txt

      - name: Run sync
        working-directory: supabase_backend/sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python main.py ${{ inputs.refresh_all == true && '--refresh-all' || '' }}
